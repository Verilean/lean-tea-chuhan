<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>楚漢恋歌 — Chu-Han Love Song</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden;
                 background: #0a0a0a; color: #e7e2d1;
                 font-family: 'YuMincho', 'Hiragino Mincho ProN', serif; }
    #stage { position: relative; width: 100vw; height: 100vh; }

    /* ── Button kit ──────────────────────────────────────────────
       Every interactive control comes from button()/buttonMod()/
       buttonHtml() in Game.leanjs as `<button class="btn btn-KIND">`.
       Adding a new control = add a kind here + add an SFX entry in
       sfxForButton() below. No bespoke per-site classes. */
    .btn {
      font: inherit; cursor: pointer; border: 1px solid #4a3a2a;
      background: transparent; color: #c8a96a; transition: all 150ms;
      line-height: 1.3;
    }
    .btn-primary {
      padding: 10px 36px; font-size: 16px; letter-spacing: 6px;
      border-radius: 4px; color: #c8a96a; border-color: #c8a96a;
      background: transparent;
    }
    .btn-primary:hover { background: #c8a96a; color: #0a0a0a; }
    .btn-icon {
      padding: 2px 10px; font-size: 11px; color: #888; border-radius: 3px;
    }
    .btn-icon:hover, .btn-icon.active { color: #c8a96a; border-color: #c8a96a; }
    .btn-menu {
      display: block; width: 100%; padding: 6px 10px; text-align: left;
      color: #e7e2d1; border: 0; font-size: 12px; border-radius: 3px;
    }
    .btn-menu:hover { background: #2a1a14; color: #c8a96a; }
    .btn-choice {
      pointer-events: auto;
      background: rgba(10,10,10,0.92); color: #e7e2d1;
      border: 1px solid #6a5a4a; border-radius: 4px;
      padding: 12px 20px; font-size: 15px; text-align: left;
    }
    .btn-choice:hover { background: rgba(40,28,18,0.95); border-color: #c8a96a; }
    .btn-choice .hint { color: #888; font-size: 12px; margin-top: 4px; }
    .btn-face {
      flex: 1; background: #1a1410; color: #aaa;
      border: 1px solid #3a2a1a; border-radius: 4px;
      padding: 10px 14px; font-size: 14px;
    }
    .btn-face:hover { border-color: #c8a96a; color: #e7e2d1; }
    .btn-face.active { background: #2a1810; border-color: #c8a96a; color: #c8a96a; }
    .btn-jade {
      display: block; margin: 16px auto; padding: 16px 40px;
      background: #2a1810; color: #c8a96a; border: 2px solid #c8a96a;
      border-radius: 8px; font-size: 18px; font-weight: 700;
      letter-spacing: 4px;
    }
    .btn-jade:hover { background: #3a2018; }
    .btn-card {
      background: #1a1410; color: #e7e2d1; border: 1px solid #3a2a1a;
      border-radius: 6px; padding: 16px 12px; text-align: left;
      font-size: 14px;
    }
    .btn-card:hover { border-color: #c8a96a; background: #221a14; }
    .btn-card .card-title { font-weight: 600; letter-spacing: 2px; margin-bottom: 6px; }
    .btn-card .card-hint  { color: #888; font-size: 12px; }
    .btn-char {
      background: #1a1410; color: #e7e2d1; border: 1px solid #3a2a1a;
      border-radius: 6px; padding: 14px; text-align: left; font-size: 14px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .btn-char:hover { border-color: #c8a96a; background: #221a14; }
    .btn-char.active { border-color: #c8a96a; background: #2a1a14; }
    .btn-char h3 { margin: 0; font-size: 20px; color: #e7e2d1; letter-spacing: 4px; }
    .btn-char .epithet { color: #c8a96a; font-size: 13px; letter-spacing: 2px; }
    .btn-char .desc { color: #aaa; font-size: 12px; line-height: 1.5; flex: 1; }
    .btn-char .difficulty { color: #ca8a04; font-size: 11px; }
    .btn-char:hover .portrait img { transform: scale(1.04); filter: none; }

    /* ── Panel kit (bordered container, emitted by panel()) ───── */
    .panel { color: #e7e2d1; }
    .panel h2 {
      margin: 0 0 12px; color: #c8a96a; letter-spacing: 6px; font-weight: 400;
      border-bottom: 1px solid #3a2a1a; padding-bottom: 8px;
    }
    .panel-mini {
      position: absolute; left: 50%; top: 56px; transform: translateX(-50%);
      width: min(720px, 90vw); padding: 22px 28px;
      background: rgba(10,10,10,0.92); border: 1px solid #4a3a2a;
      border-radius: 8px;
    }
    .panel-mini.wide { width: min(920px, 95vw); }
    .panel-chat {
      position: absolute; left: 50%; top: 56px; transform: translateX(-50%);
      width: min(720px, 92vw); height: calc(100vh - 96px);
      background: rgba(10,10,10,0.9); border: 1px solid #4a3a2a; border-radius: 8px;
      display: flex; flex-direction: column;
    }
    .panel-dialogue {
      position: absolute; bottom: 20px; left: 20px; right: 20px;
      background: rgba(10,10,10,0.88); border: 1px solid #3a2a1a;
      border-radius: 8px; padding: 18px 26px;
      min-height: 160px;
    }

    /* ── Title screen ── */
    .title-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, #2a1810 0%, #0a0505 70%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px;
    }
    .title-bg h1 {
      font-size: 72px; margin: 0; letter-spacing: 16px; color: #c8a96a;
      text-shadow: 0 0 24px rgba(200,169,106,0.4);
      transform: translateY(-30px);
    }
    .title-bg .sub { color: #888; letter-spacing: 8px; font-size: 14px; }

    /* ── Character select ── */
    .select-bg {
      position: absolute; inset: 0; padding: 40px;
      background: linear-gradient(180deg, #1a0a05 0%, #0a0505 100%);
      display: flex; flex-direction: column; gap: 16px;
    }
    .select-bg h2 {
      margin: 0; color: #c8a96a; letter-spacing: 8px; font-weight: 400;
      border-bottom: 1px solid #4a3a2a; padding-bottom: 8px;
    }
    .roster {
      flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
      overflow: auto;
    }
    /* Loud placeholder for assets that haven't been drawn yet. Pairs
       with missingAsset() in Game.leanjs + the asset audit in Serve.lean. */
    .missing-asset {
      display: flex; align-items: center; justify-content: center;
      width: 200px; height: 360px; padding: 16px;
      background: repeating-linear-gradient(45deg,
        #ff00ff, #ff00ff 12px, #2a0a2a 12px, #2a0a2a 24px);
      color: #fff; font-size: 14px; letter-spacing: 2px; text-align: center;
      border: 2px dashed #ff00ff; border-radius: 4px;
      text-shadow: 0 0 4px #000;
    }

    /* Portrait: image + gradient name overlay, emitted by portrait() */
    .portrait {
      position: relative; width: 100%; height: 200px; border-radius: 4px;
      overflow: hidden; background: #0a0805;
      box-shadow: inset 0 -20px 40px rgba(0,0,0,0.4);
    }
    .portrait img {
      width: 100%; height: 100%; object-fit: cover; object-position: center top;
      display: block; transition: transform 400ms ease;
      filter: saturate(0.92) contrast(1.04);
    }
    .portrait-name {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 6px 10px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.85) 80%);
      color: #f0e8d0; font-size: 18px; letter-spacing: 4px; text-align: right;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    /* ── VN scene ── */
    .scene-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: background 800ms;
    }
    .scene-bg::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.85) 100%);
    }
    .sprite-row {
      position: absolute; bottom: 220px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 80px;
      pointer-events: none;
    }
    .sprite {
      width: 200px; height: 360px; border-radius: 10px 10px 0 0;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 16px;
      font-size: 14px; color: #e7e2d1; letter-spacing: 4px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.7) 100%);
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      transition: all 500ms;
    }
    .sprite.dim { opacity: 0.55; transform: translateY(8px); }
    .sprite-img {
      width: 100%; height: 100%; object-fit: cover; object-position: top;
      border-radius: 10px 10px 0 0;
      mask-image: linear-gradient(180deg, #000 60%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 60%, transparent 100%);
    }
    .sprite-name {
      position: absolute; bottom: 18px; left: 0; right: 0;
      text-align: center; color: #e7e2d1; letter-spacing: 4px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
      pointer-events: none;
    }
    .sprite { position: relative; }
    .dialogue-speaker {
      color: #c8a96a; font-weight: 600; font-size: 15px; letter-spacing: 4px;
      margin-bottom: 6px;
    }
    .dialogue-line {
      font-size: 17px; line-height: 1.7; color: #e7e2d1;
    }
    .dialogue-inner {
      margin-top: 10px; padding: 8px 12px; border-left: 2px solid #6a5a4a;
      color: #999; font-style: italic; font-size: 15px; line-height: 1.6;
    }
    .dialogue-inner::before { content: "《"; color: #6a5a4a; }
    .dialogue-inner::after  { content: "》"; color: #6a5a4a; }
    .advance-hint {
      position: absolute; bottom: 8px; right: 14px;
      color: #888; font-size: 12px; animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    .choices {
      position: absolute; bottom: 220px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px; min-width: 480px;
      pointer-events: none; z-index: 5;
    }

    /* ── HUD (top bar, persistent) ── */
    .hud {
      position: absolute; top: 0; left: 0; right: 0; height: 40px;
      background: linear-gradient(180deg, rgba(0,0,0,0.85), transparent);
      display: flex; align-items: center; gap: 16px; padding: 0 16px;
      font-size: 12px; z-index: 10;
    }
    .hud .who { color: #c8a96a; letter-spacing: 3px; }
    .hud .stat { color: #aaa; }
    .hud .stat b { color: #e7e2d1; margin-left: 4px; }
    .hud .yr { color: #ca8a04; letter-spacing: 2px; margin-left: auto; }
    /* The lang toggle is btn-row-inline (2 icon buttons); no extra
       HUD-scoped rules — the base .btn-row-inline styling handles it. */

    /* ── Battle (canvas) ── */
    .battle-bg {
      position: absolute; inset: 0; background: #1a1a1a;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px;
    }
    #battleCanvas {
      background: #2a2418; border: 1px solid #4a3a2a;
      image-rendering: pixelated;
    }
    .battle-hud {
      display: flex; gap: 18px; align-items: center;
      color: #e7e2d1; font-size: 13px; letter-spacing: 2px;
    }
    .battle-hud .hp { display: flex; flex-direction: column; gap: 2px; min-width: 120px; }
    .battle-hud .hp .bar {
      height: 8px; background: #3a2a1a; border-radius: 2px; overflow: hidden;
    }
    .battle-hud .hp .bar > div {
      height: 100%; background: linear-gradient(90deg, #dc2626, #f59e0b);
      transition: width 200ms;
    }
    .battle-hud .help { color: #888; font-size: 11px; }
    .battle-result {
      position: absolute; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; font-size: 28px; color: #c8a96a; letter-spacing: 8px;
    }

    /* ── Background palette (placeholder before real art) ── */
    /* Background scenes — photorealistic images via FLUX schnell. */
    [class*="bg-"] { background-size: cover; background-position: center; }
    .bg-pei        { background-image: url(/assets/bg_pei.png); }
    .bg-banquet    { background-image: url(/assets/bg_banquet.png); }
    .bg-house      { background-image: url(/assets/bg_house.png); }
    .bg-mountain   { background-image: url(/assets/bg_mountain.png); }
    .bg-camp       { background-image: url(/assets/bg_camp.png); }
    .bg-court      { background-image: url(/assets/bg_court.png); }
    .bg-battlefield{ background-image: url(/assets/bg_battlefield.png); }
    .bg-river      { background-image: url(/assets/bg_river.png); }
    .bg-snow       { background-image: url(/assets/bg_snow.png); }
    .bg-palace     { background-image: url(/assets/bg_palace.png); }
    .bg-jielo      { background-image: url(/assets/bg_jielo.png);
                     animation: ember 3s ease-in-out infinite alternate; }
    @keyframes ember { from { filter: hue-rotate(0); } to { filter: hue-rotate(-15deg); } }
    .bg-yingyang   { background-image: url(/assets/bg_yingyang.png); }
    .bg-pavilion   { background-image: url(/assets/bg_pavilion.png); }
    .bg-tent       { background-image: url(/assets/bg_tent.png); }
    .bg-altar      { background-image: url(/assets/bg_altar.png); }
    .bg-burning    { background-image: url(/assets/bg_burning.png);
                     animation: ember 1.8s ease-in-out infinite alternate; }
    .bg-pengcheng  { background-image: url(/assets/bg_pengcheng.png); }
    .bg-gorge      { background-image: url(/assets/bg_gorge.png); }
    .bg-night      { background-image: url(/assets/bg_night.png); }
  /* ── Mini-game widgets ── */
  .mini-hint { color: #aaa; font-size: 14px; margin: 6px 0 16px; }

  /* ── Button rows (btnRow) ─────────────────────────────────────
     Kinds: face (flex row w/ leading label column, buttons grow),
     inline (flex row, no label — HUD JA/EN toggle),
     menu (vertical stack — save-pop). */
  .btn-row { display: flex; align-items: center; gap: 6px; }
  .btn-row-face   { margin: 10px 0; }
  .btn-row-inline { gap: 4px; }
  .btn-row-menu   { flex-direction: column; align-items: stretch; gap: 2px; }
  .btn-row-label {
    width: 80px; color: #c8a96a; font-size: 13px; letter-spacing: 3px;
    flex-shrink: 0;
  }

  /* ── Gauges (hpBar / ringBar) ─────────────────────────────────
     Shared label · track · num row layout with a per-kind fill. */
  .gauge {
    display: flex; align-items: center; gap: 10px; font-size: 13px;
    margin: 6px 0;
  }
  .gauge-label {
    width: 100px; color: #c8a96a; letter-spacing: 2px; flex-shrink: 0;
  }
  .gauge-track {
    flex: 1; height: 14px; background: #1a1410; border: 1px solid #3a2a1a;
    border-radius: 4px; overflow: hidden; position: relative;
  }
  .gauge-fill { height: 100%; }
  .gauge-num {
    width: 80px; color: #aaa; text-align: right;
    font-family: ui-monospace, Menlo, monospace;
  }
  /* Per-kind fill colours */
  .gauge-hp .gauge-fill { background: linear-gradient(90deg, #dc2626, #f59e0b); }
  /* Ring gauge overrides — no label / num, taller bar, absolute overlays */
  .gauge-ring { margin: 22px 0 14px; }
  .gauge-ring .gauge-track { height: 18px; overflow: visible; }
  .ring-window {
    position: absolute; top: 0; bottom: 0;
    background: rgba(76, 175, 80, 0.35);
    border-left: 2px solid #4ade80; border-right: 2px solid #4ade80;
  }
  .ring-cursor {
    position: absolute; top: -4px; bottom: -4px; width: 3px;
    background: #c8a96a; transform: translateX(-1.5px);
  }

  .mini-status { text-align: center; color: #4ade80; font-size: 14px; min-height: 20px; }
  /* beishui board (still bespoke: card grid + turn label + log) */
  .bs-board { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
  .bs-turn { color: #c8a96a; text-align: center; letter-spacing: 4px; margin: 14px 0 8px; }
  .bs-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 8px 0; }
  .bs-log { color: #aaa; font-size: 13px; margin: 4px 0; }
  /* mini result */
  .mini-result { text-align: center; padding: 14px 0; }
  .mini-score { color: #c8a96a; letter-spacing: 4px; font-size: 18px; margin-bottom: 10px; }
  .mini-line { color: #e7e2d1; line-height: 1.7; margin-bottom: 12px; }
  /* save / load HUD additions */
  .save-menu {
    position: relative; display: inline-block;
  }
  .save-menu .save-pop {
    display: none; position: absolute; right: 0; top: 22px;
    background: #1a1410; border: 1px solid #3a2a1a; border-radius: 4px;
    padding: 6px; gap: 4px; flex-direction: column; z-index: 100; min-width: 200px;
  }
  .save-menu.open .save-pop { display: flex; }
  .save-menu .save-pop hr {
    border: 0; border-top: 1px solid #3a2a1a; margin: 4px 0;
  }
  .save-menu .save-code { font-size: 12px; color: #c8b89a; line-height: 1.5; }
  .save-menu .save-code b { color: #f0e6d2; letter-spacing: 1px; }
  .save-menu .save-code-hint { color: #8a7d63; font-size: 11px; margin: 2px 0 4px; }
  .save-menu .save-code-input {
    width: 100%; box-sizing: border-box; margin-bottom: 4px;
    background: #120e0a; border: 1px solid #3a2a1a; border-radius: 4px;
    color: #f0e6d2; padding: 4px 6px; font-size: 12px;
  }
  /* ── LLM chat ── */
  .chat-header {
    padding: 12px 16px; border-bottom: 1px solid #3a2a1a;
    display: flex; align-items: center; gap: 8px; font-size: 14px;
  }
  .chat-npc-name { font-weight: 600; letter-spacing: 4px; font-size: 16px; }
  .chat-header .btn { margin-left: auto; }
  .chat-history {
    flex: 1; overflow-y: auto; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chat-bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 12px;
    white-space: pre-wrap; word-wrap: break-word; line-height: 1.65;
  }
  .chat-bubble.user { align-self: flex-end; background: #1e3a8a; color: #e0e7ff; }
  .chat-bubble.npc {
    align-self: flex-start; background: #2a1a14; color: #e7e2d1;
    border-left: 3px solid #c8a96a;
  }
  .chat-pending { color: #888; font-style: italic; padding: 4px 8px; }
  .chat-error { color: #f87171; padding: 6px 10px; font-size: 13px;
                background: rgba(248,113,113,0.1); border-radius: 4px; }
  .chat-input-row {
    padding: 10px 12px; border-top: 1px solid #3a2a1a;
    display: flex; gap: 8px; align-items: stretch;
  }
  .chat-input {
    flex: 1; background: #1a1410; color: #e7e2d1;
    border: 1px solid #3a2a1a; border-radius: 6px;
    padding: 10px 12px; font: inherit; resize: vertical; min-height: 50px;
  }
  .chat-input:disabled { opacity: 0.55; }
  .chat-send {
    background: #c8a96a; color: #0a0a0a; border: 0; border-radius: 6px;
    padding: 0 22px; font: inherit; font-weight: 600; cursor: pointer; letter-spacing: 4px;
  }
  .chat-send:disabled { background: #555; color: #aaa; cursor: progress; }

  /* ── TRPG aiResolve view ─────────────────────────────────────── */
  .resolve-situation {
    color: #e7e2d1; line-height: 1.7; font-size: 15px;
    padding: 14px 16px; background: rgba(40,28,18,0.6);
    border-left: 3px solid #c8a96a; border-radius: 4px;
    margin-bottom: 14px; white-space: pre-line;
  }
  .resolve-echo {
    color: #aaa; font-size: 13px; padding: 10px 14px; margin: 8px 0;
    background: #1e3a8a; color: #e0e7ff; border-radius: 6px;
  }
  .resolve-pending { color: #888; font-style: italic; padding: 8px 12px; }
  .resolve-error { color: #f87171; padding: 8px 12px; background: rgba(248,113,113,0.1); border-radius: 4px; }
  .resolve-input-row { display: flex; gap: 8px; margin-top: 10px; align-items: stretch; }
  .resolve-input {
    flex: 1; background: #1a1410; color: #e7e2d1;
    border: 1px solid #3a2a1a; border-radius: 6px;
    padding: 10px 12px; font: inherit; resize: vertical; min-height: 70px;
  }
  .resolve-input:disabled { opacity: 0.55; }
  .resolve-outcome {
    text-align: center; padding: 12px; margin: 14px 0 6px;
    font-size: 22px; letter-spacing: 8px; border-radius: 6px;
  }
  .resolve-outcome.good { color: #4ade80; background: rgba(74,222,128,0.1); border: 1px solid #4ade80; }
  .resolve-outcome.ok   { color: #c8a96a; background: rgba(200,169,106,0.1); border: 1px solid #c8a96a; }
  .resolve-outcome.bad  { color: #f87171; background: rgba(248,113,113,0.1); border: 1px solid #f87171; }
  .resolve-reasoning {
    padding: 12px 16px; color: #e7e2d1; line-height: 1.6; font-size: 14px;
    background: rgba(10,10,10,0.6); border-radius: 4px; margin-bottom: 12px;
  }

  /* Ending screen */
  .end-bg {
    position: absolute; inset: 0;
    background: #000; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .end-image {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.55);
  }
  .end-overlay {
    position: relative; z-index: 1;
    text-align: center; padding: 80px 20px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }
  .end-title {
    color: #c8a96a; letter-spacing: 6px; font-size: 32px; font-weight: 400;
    text-shadow: 0 4px 16px rgba(0,0,0,0.95);
    max-width: 90vw;
  }
  .end-sub {
    color: #ddd; max-width: 600px; line-height: 2.0; font-size: 15px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.95);
  }
  /* Gallery */
  .gallery-list {
    width: min(680px, 90vw); max-height: 60vh; overflow-y: auto;
    background: rgba(10,10,10,0.6); border: 1px solid #3a2a1a;
    border-radius: 6px; padding: 14px; margin: 16px 0;
    display: flex; flex-direction: column; gap: 4px;
  }
  .ending-row {
    display: flex; gap: 12px; align-items: center;
    padding: 6px 10px; border-radius: 4px;
    color: #6a5a4a; font-size: 13px;
  }
  .ending-row.done { color: #c8a96a; background: rgba(200,169,106,0.08); }
  .ending-row .mark { width: 22px; text-align: center; font-weight: 700; }
  .ending-row .title { flex: 1; }

    /* ── Toast (status updates) ── */
    .toast-stack {
      position: absolute; top: 56px; right: 12px; display: flex; flex-direction: column; gap: 4px;
      pointer-events: none; z-index: 20;
    }
    .toast {
      background: rgba(10,10,10,0.85); border-left: 3px solid #c8a96a;
      color: #e7e2d1; padding: 6px 12px; font-size: 13px; letter-spacing: 2px;
      animation: toast-in 250ms ease-out, toast-out 400ms 2.6s forwards;
    }
    .toast.bad { border-left-color: #dc2626; }
    .toast.warn { border-left-color: #ca8a04; }
    @keyframes toast-in  { from { transform: translateX(20px); opacity: 0; } }
    @keyframes toast-out { to   { transform: translateX(20px); opacity: 0; } }
  </style>
</head>
