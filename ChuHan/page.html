<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>楚漢恋歌 — Chu-Han Love Song</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden;
                 background: #0a0a0a; color: #e7e2d1;
                 font-family: 'YuMincho', 'Hiragino Mincho ProN', serif; }
    #stage { position: relative; width: 100vw; height: 100vh; }

    /* ── Button kit ──────────────────────────────────────────────
       Every interactive control comes from button()/buttonMod()/
       buttonHtml() in Game.leanjs as `<button class="btn btn-KIND">`.
       Adding a new control = add a kind here + add an SFX entry in
       sfxForButton() below. No bespoke per-site classes. */
    .btn {
      font: inherit; cursor: pointer; border: 1px solid #4a3a2a;
      background: transparent; color: #c8a96a; transition: all 150ms;
      line-height: 1.3;
    }
    .btn-primary {
      padding: 10px 36px; font-size: 16px; letter-spacing: 6px;
      border-radius: 4px; color: #c8a96a; border-color: #c8a96a;
      background: transparent;
    }
    .btn-primary:hover { background: #c8a96a; color: #0a0a0a; }
    .btn-icon {
      padding: 2px 10px; font-size: 11px; color: #888; border-radius: 3px;
    }
    .btn-icon:hover, .btn-icon.active { color: #c8a96a; border-color: #c8a96a; }
    .btn-menu {
      display: block; width: 100%; padding: 6px 10px; text-align: left;
      color: #e7e2d1; border: 0; font-size: 12px; border-radius: 3px;
    }
    .btn-menu:hover { background: #2a1a14; color: #c8a96a; }
    .btn-choice {
      pointer-events: auto;
      background: rgba(10,10,10,0.92); color: #e7e2d1;
      border: 1px solid #6a5a4a; border-radius: 4px;
      padding: 12px 20px; font-size: 15px; text-align: left;
    }
    .btn-choice:hover { background: rgba(40,28,18,0.95); border-color: #c8a96a; }
    .btn-choice .hint { color: #888; font-size: 12px; margin-top: 4px; }
    .btn-face {
      flex: 1; background: #1a1410; color: #aaa;
      border: 1px solid #3a2a1a; border-radius: 4px;
      padding: 10px 14px; font-size: 14px;
    }
    .btn-face:hover { border-color: #c8a96a; color: #e7e2d1; }
    .btn-face.active { background: #2a1810; border-color: #c8a96a; color: #c8a96a; }
    .btn-jade {
      display: block; margin: 16px auto; padding: 16px 40px;
      background: #2a1810; color: #c8a96a; border: 2px solid #c8a96a;
      border-radius: 8px; font-size: 18px; font-weight: 700;
      letter-spacing: 4px;
    }
    .btn-jade:hover { background: #3a2018; }
    .btn-card {
      background: #1a1410; color: #e7e2d1; border: 1px solid #3a2a1a;
      border-radius: 6px; padding: 16px 12px; text-align: left;
      font-size: 14px;
    }
    .btn-card:hover { border-color: #c8a96a; background: #221a14; }
    .btn-card .card-title { font-weight: 600; letter-spacing: 2px; margin-bottom: 6px; }
    .btn-card .card-hint  { color: #888; font-size: 12px; }
    .btn-char {
      background: #1a1410; color: #e7e2d1; border: 1px solid #3a2a1a;
      border-radius: 6px; padding: 14px; text-align: left; font-size: 14px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .btn-char:hover { border-color: #c8a96a; background: #221a14; }
    .btn-char.active { border-color: #c8a96a; background: #2a1a14; }
    .btn-char h3 { margin: 0; font-size: 20px; color: #e7e2d1; letter-spacing: 4px; }
    .btn-char .epithet { color: #c8a96a; font-size: 13px; letter-spacing: 2px; }
    .btn-char .desc { color: #aaa; font-size: 12px; line-height: 1.5; flex: 1; }
    .btn-char .difficulty { color: #ca8a04; font-size: 11px; }
    .btn-char:hover .portrait img { transform: scale(1.04); filter: none; }

    /* ── Panel kit (bordered container, emitted by panel()) ───── */
    .panel { color: #e7e2d1; }
    .panel h2 {
      margin: 0 0 12px; color: #c8a96a; letter-spacing: 6px; font-weight: 400;
      border-bottom: 1px solid #3a2a1a; padding-bottom: 8px;
    }
    .panel-mini {
      position: absolute; left: 50%; top: 56px; transform: translateX(-50%);
      width: min(720px, 90vw); padding: 22px 28px;
      background: rgba(10,10,10,0.92); border: 1px solid #4a3a2a;
      border-radius: 8px;
    }
    .panel-mini.wide { width: min(920px, 95vw); }
    .panel-chat {
      position: absolute; left: 50%; top: 56px; transform: translateX(-50%);
      width: min(720px, 92vw); height: calc(100vh - 96px);
      background: rgba(10,10,10,0.9); border: 1px solid #4a3a2a; border-radius: 8px;
      display: flex; flex-direction: column;
    }
    .panel-dialogue {
      position: absolute; bottom: 20px; left: 20px; right: 20px;
      background: rgba(10,10,10,0.88); border: 1px solid #3a2a1a;
      border-radius: 8px; padding: 18px 26px;
      min-height: 160px;
    }

    /* ── Title screen ── */
    .title-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, #2a1810 0%, #0a0505 70%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 24px;
    }
    .title-bg h1 {
      font-size: 72px; margin: 0; letter-spacing: 16px; color: #c8a96a;
      text-shadow: 0 0 24px rgba(200,169,106,0.4);
      transform: translateY(-30px);
    }
    .title-bg .sub { color: #888; letter-spacing: 8px; font-size: 14px; }

    /* ── Character select ── */
    .select-bg {
      position: absolute; inset: 0; padding: 40px;
      background: linear-gradient(180deg, #1a0a05 0%, #0a0505 100%);
      display: flex; flex-direction: column; gap: 16px;
    }
    .select-bg h2 {
      margin: 0; color: #c8a96a; letter-spacing: 8px; font-weight: 400;
      border-bottom: 1px solid #4a3a2a; padding-bottom: 8px;
    }
    .roster {
      flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
      overflow: auto;
    }
    /* Loud placeholder for assets that haven't been drawn yet. Pairs
       with missingAsset() in Game.leanjs + the asset audit in Serve.lean. */
    .missing-asset {
      display: flex; align-items: center; justify-content: center;
      width: 200px; height: 360px; padding: 16px;
      background: repeating-linear-gradient(45deg,
        #ff00ff, #ff00ff 12px, #2a0a2a 12px, #2a0a2a 24px);
      color: #fff; font-size: 14px; letter-spacing: 2px; text-align: center;
      border: 2px dashed #ff00ff; border-radius: 4px;
      text-shadow: 0 0 4px #000;
    }

    /* Portrait: image + gradient name overlay, emitted by portrait() */
    .portrait {
      position: relative; width: 100%; height: 200px; border-radius: 4px;
      overflow: hidden; background: #0a0805;
      box-shadow: inset 0 -20px 40px rgba(0,0,0,0.4);
    }
    .portrait img {
      width: 100%; height: 100%; object-fit: cover; object-position: center top;
      display: block; transition: transform 400ms ease;
      filter: saturate(0.92) contrast(1.04);
    }
    .portrait-name {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 6px 10px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.85) 80%);
      color: #f0e8d0; font-size: 18px; letter-spacing: 4px; text-align: right;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    /* ── VN scene ── */
    .scene-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      transition: background 800ms;
    }
    .scene-bg::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.85) 100%);
    }
    .sprite-row {
      position: absolute; bottom: 220px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 80px;
      pointer-events: none;
    }
    .sprite {
      width: 200px; height: 360px; border-radius: 10px 10px 0 0;
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 16px;
      font-size: 14px; color: #e7e2d1; letter-spacing: 4px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.7) 100%);
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      transition: all 500ms;
    }
    .sprite.dim { opacity: 0.55; transform: translateY(8px); }
    .sprite-img {
      width: 100%; height: 100%; object-fit: cover; object-position: top;
      border-radius: 10px 10px 0 0;
      mask-image: linear-gradient(180deg, #000 60%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 60%, transparent 100%);
    }
    .sprite-name {
      position: absolute; bottom: 18px; left: 0; right: 0;
      text-align: center; color: #e7e2d1; letter-spacing: 4px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.9);
      pointer-events: none;
    }
    .sprite { position: relative; }
    .dialogue-speaker {
      color: #c8a96a; font-weight: 600; font-size: 15px; letter-spacing: 4px;
      margin-bottom: 6px;
    }
    .dialogue-line {
      font-size: 17px; line-height: 1.7; color: #e7e2d1;
    }
    .dialogue-inner {
      margin-top: 10px; padding: 8px 12px; border-left: 2px solid #6a5a4a;
      color: #999; font-style: italic; font-size: 15px; line-height: 1.6;
    }
    .dialogue-inner::before { content: "《"; color: #6a5a4a; }
    .dialogue-inner::after  { content: "》"; color: #6a5a4a; }
    .advance-hint {
      position: absolute; bottom: 8px; right: 14px;
      color: #888; font-size: 12px; animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
    .choices {
      position: absolute; bottom: 220px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px; min-width: 480px;
      pointer-events: none; z-index: 5;
    }

    /* ── HUD (top bar, persistent) ── */
    .hud {
      position: absolute; top: 0; left: 0; right: 0; height: 40px;
      background: linear-gradient(180deg, rgba(0,0,0,0.85), transparent);
      display: flex; align-items: center; gap: 16px; padding: 0 16px;
      font-size: 12px; z-index: 10;
    }
    .hud .who { color: #c8a96a; letter-spacing: 3px; }
    .hud .stat { color: #aaa; }
    .hud .stat b { color: #e7e2d1; margin-left: 4px; }
    .hud .yr { color: #ca8a04; letter-spacing: 2px; margin-left: auto; }
    /* The lang toggle is btn-row-inline (2 icon buttons); no extra
       HUD-scoped rules — the base .btn-row-inline styling handles it. */

    /* ── Battle (canvas) ── */
    .battle-bg {
      position: absolute; inset: 0; background: #1a1a1a;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px;
    }
    #battleCanvas {
      background: #2a2418; border: 1px solid #4a3a2a;
      image-rendering: pixelated;
    }
    .battle-hud {
      display: flex; gap: 18px; align-items: center;
      color: #e7e2d1; font-size: 13px; letter-spacing: 2px;
    }
    .battle-hud .hp { display: flex; flex-direction: column; gap: 2px; min-width: 120px; }
    .battle-hud .hp .bar {
      height: 8px; background: #3a2a1a; border-radius: 2px; overflow: hidden;
    }
    .battle-hud .hp .bar > div {
      height: 100%; background: linear-gradient(90deg, #dc2626, #f59e0b);
      transition: width 200ms;
    }
    .battle-hud .help { color: #888; font-size: 11px; }
    .battle-result {
      position: absolute; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; font-size: 28px; color: #c8a96a; letter-spacing: 8px;
    }

    /* ── Background palette (placeholder before real art) ── */
    /* Background scenes — photorealistic images via FLUX schnell. */
    [class*="bg-"] { background-size: cover; background-position: center; }
    .bg-pei        { background-image: url(/assets/bg_pei.png); }
    .bg-banquet    { background-image: url(/assets/bg_banquet.png); }
    .bg-house      { background-image: url(/assets/bg_house.png); }
    .bg-mountain   { background-image: url(/assets/bg_mountain.png); }
    .bg-camp       { background-image: url(/assets/bg_camp.png); }
    .bg-court      { background-image: url(/assets/bg_court.png); }
    .bg-battlefield{ background-image: url(/assets/bg_battlefield.png); }
    .bg-river      { background-image: url(/assets/bg_river.png); }
    .bg-snow       { background-image: url(/assets/bg_snow.png); }
    .bg-palace     { background-image: url(/assets/bg_palace.png); }
    .bg-jielo      { background-image: url(/assets/bg_jielo.png);
                     animation: ember 3s ease-in-out infinite alternate; }
    @keyframes ember { from { filter: hue-rotate(0); } to { filter: hue-rotate(-15deg); } }
    .bg-yingyang   { background-image: url(/assets/bg_yingyang.png); }
    .bg-pavilion   { background-image: url(/assets/bg_pavilion.png); }
    .bg-tent       { background-image: url(/assets/bg_tent.png); }
    .bg-altar      { background-image: url(/assets/bg_altar.png); }
    .bg-burning    { background-image: url(/assets/bg_burning.png);
                     animation: ember 1.8s ease-in-out infinite alternate; }
    .bg-pengcheng  { background-image: url(/assets/bg_pengcheng.png); }
    .bg-gorge      { background-image: url(/assets/bg_gorge.png); }
    .bg-night      { background-image: url(/assets/bg_night.png); }
  /* ── Mini-game widgets ── */
  .mini-hint { color: #aaa; font-size: 14px; margin: 6px 0 16px; }

  /* ── Button rows (btnRow) ─────────────────────────────────────
     Kinds: face (flex row w/ leading label column, buttons grow),
     inline (flex row, no label — HUD JA/EN toggle),
     menu (vertical stack — save-pop). */
  .btn-row { display: flex; align-items: center; gap: 6px; }
  .btn-row-face   { margin: 10px 0; }
  .btn-row-inline { gap: 4px; }
  .btn-row-menu   { flex-direction: column; align-items: stretch; gap: 2px; }
  .btn-row-label {
    width: 80px; color: #c8a96a; font-size: 13px; letter-spacing: 3px;
    flex-shrink: 0;
  }

  /* ── Gauges (hpBar / ringBar) ─────────────────────────────────
     Shared label · track · num row layout with a per-kind fill. */
  .gauge {
    display: flex; align-items: center; gap: 10px; font-size: 13px;
    margin: 6px 0;
  }
  .gauge-label {
    width: 100px; color: #c8a96a; letter-spacing: 2px; flex-shrink: 0;
  }
  .gauge-track {
    flex: 1; height: 14px; background: #1a1410; border: 1px solid #3a2a1a;
    border-radius: 4px; overflow: hidden; position: relative;
  }
  .gauge-fill { height: 100%; }
  .gauge-num {
    width: 80px; color: #aaa; text-align: right;
    font-family: ui-monospace, Menlo, monospace;
  }
  /* Per-kind fill colours */
  .gauge-hp .gauge-fill { background: linear-gradient(90deg, #dc2626, #f59e0b); }
  /* Ring gauge overrides — no label / num, taller bar, absolute overlays */
  .gauge-ring { margin: 22px 0 14px; }
  .gauge-ring .gauge-track { height: 18px; overflow: visible; }
  .ring-window {
    position: absolute; top: 0; bottom: 0;
    background: rgba(76, 175, 80, 0.35);
    border-left: 2px solid #4ade80; border-right: 2px solid #4ade80;
  }
  .ring-cursor {
    position: absolute; top: -4px; bottom: -4px; width: 3px;
    background: #c8a96a; transform: translateX(-1.5px);
  }

  .mini-status { text-align: center; color: #4ade80; font-size: 14px; min-height: 20px; }
  /* beishui board (still bespoke: card grid + turn label + log) */
  .bs-board { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
  .bs-turn { color: #c8a96a; text-align: center; letter-spacing: 4px; margin: 14px 0 8px; }
  .bs-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 8px 0; }
  .bs-log { color: #aaa; font-size: 13px; margin: 4px 0; }
  /* mini result */
  .mini-result { text-align: center; padding: 14px 0; }
  .mini-score { color: #c8a96a; letter-spacing: 4px; font-size: 18px; margin-bottom: 10px; }
  .mini-line { color: #e7e2d1; line-height: 1.7; margin-bottom: 12px; }
  /* save / load HUD additions */
  .save-menu {
    position: relative; display: inline-block;
  }
  .save-menu .save-pop {
    display: none; position: absolute; right: 0; top: 22px;
    background: #1a1410; border: 1px solid #3a2a1a; border-radius: 4px;
    padding: 6px; gap: 4px; flex-direction: column; z-index: 100; min-width: 200px;
  }
  .save-menu.open .save-pop { display: flex; }
  .save-menu .save-pop hr {
    border: 0; border-top: 1px solid #3a2a1a; margin: 4px 0;
  }
  /* ── LLM chat ── */
  .chat-header {
    padding: 12px 16px; border-bottom: 1px solid #3a2a1a;
    display: flex; align-items: center; gap: 8px; font-size: 14px;
  }
  .chat-npc-name { font-weight: 600; letter-spacing: 4px; font-size: 16px; }
  .chat-header .btn { margin-left: auto; }
  .chat-history {
    flex: 1; overflow-y: auto; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chat-bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 12px;
    white-space: pre-wrap; word-wrap: break-word; line-height: 1.65;
  }
  .chat-bubble.user { align-self: flex-end; background: #1e3a8a; color: #e0e7ff; }
  .chat-bubble.npc {
    align-self: flex-start; background: #2a1a14; color: #e7e2d1;
    border-left: 3px solid #c8a96a;
  }
  .chat-pending { color: #888; font-style: italic; padding: 4px 8px; }
  .chat-error { color: #f87171; padding: 6px 10px; font-size: 13px;
                background: rgba(248,113,113,0.1); border-radius: 4px; }
  .chat-input-row {
    padding: 10px 12px; border-top: 1px solid #3a2a1a;
    display: flex; gap: 8px; align-items: stretch;
  }
  .chat-input {
    flex: 1; background: #1a1410; color: #e7e2d1;
    border: 1px solid #3a2a1a; border-radius: 6px;
    padding: 10px 12px; font: inherit; resize: vertical; min-height: 50px;
  }
  .chat-input:disabled { opacity: 0.55; }
  .chat-send {
    background: #c8a96a; color: #0a0a0a; border: 0; border-radius: 6px;
    padding: 0 22px; font: inherit; font-weight: 600; cursor: pointer; letter-spacing: 4px;
  }
  .chat-send:disabled { background: #555; color: #aaa; cursor: progress; }

  /* ── TRPG aiResolve view ─────────────────────────────────────── */
  .resolve-situation {
    color: #e7e2d1; line-height: 1.7; font-size: 15px;
    padding: 14px 16px; background: rgba(40,28,18,0.6);
    border-left: 3px solid #c8a96a; border-radius: 4px;
    margin-bottom: 14px; white-space: pre-line;
  }
  .resolve-echo {
    color: #aaa; font-size: 13px; padding: 10px 14px; margin: 8px 0;
    background: #1e3a8a; color: #e0e7ff; border-radius: 6px;
  }
  .resolve-pending { color: #888; font-style: italic; padding: 8px 12px; }
  .resolve-error { color: #f87171; padding: 8px 12px; background: rgba(248,113,113,0.1); border-radius: 4px; }
  .resolve-input-row { display: flex; gap: 8px; margin-top: 10px; align-items: stretch; }
  .resolve-input {
    flex: 1; background: #1a1410; color: #e7e2d1;
    border: 1px solid #3a2a1a; border-radius: 6px;
    padding: 10px 12px; font: inherit; resize: vertical; min-height: 70px;
  }
  .resolve-input:disabled { opacity: 0.55; }
  .resolve-outcome {
    text-align: center; padding: 12px; margin: 14px 0 6px;
    font-size: 22px; letter-spacing: 8px; border-radius: 6px;
  }
  .resolve-outcome.good { color: #4ade80; background: rgba(74,222,128,0.1); border: 1px solid #4ade80; }
  .resolve-outcome.ok   { color: #c8a96a; background: rgba(200,169,106,0.1); border: 1px solid #c8a96a; }
  .resolve-outcome.bad  { color: #f87171; background: rgba(248,113,113,0.1); border: 1px solid #f87171; }
  .resolve-reasoning {
    padding: 12px 16px; color: #e7e2d1; line-height: 1.6; font-size: 14px;
    background: rgba(10,10,10,0.6); border-radius: 4px; margin-bottom: 12px;
  }

  /* Ending screen */
  .end-bg {
    position: absolute; inset: 0;
    background: #000; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .end-image {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.55);
  }
  .end-overlay {
    position: relative; z-index: 1;
    text-align: center; padding: 80px 20px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }
  .end-title {
    color: #c8a96a; letter-spacing: 6px; font-size: 32px; font-weight: 400;
    text-shadow: 0 4px 16px rgba(0,0,0,0.95);
    max-width: 90vw;
  }
  .end-sub {
    color: #ddd; max-width: 600px; line-height: 2.0; font-size: 15px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.95);
  }
  /* Gallery */
  .gallery-list {
    width: min(680px, 90vw); max-height: 60vh; overflow-y: auto;
    background: rgba(10,10,10,0.6); border: 1px solid #3a2a1a;
    border-radius: 6px; padding: 14px; margin: 16px 0;
    display: flex; flex-direction: column; gap: 4px;
  }
  .ending-row {
    display: flex; gap: 12px; align-items: center;
    padding: 6px 10px; border-radius: 4px;
    color: #6a5a4a; font-size: 13px;
  }
  .ending-row.done { color: #c8a96a; background: rgba(200,169,106,0.08); }
  .ending-row .mark { width: 22px; text-align: center; font-weight: 700; }
  .ending-row .title { flex: 1; }

    /* ── Toast (status updates) ── */
    .toast-stack {
      position: absolute; top: 56px; right: 12px; display: flex; flex-direction: column; gap: 4px;
      pointer-events: none; z-index: 20;
    }
    .toast {
      background: rgba(10,10,10,0.85); border-left: 3px solid #c8a96a;
      color: #e7e2d1; padding: 6px 12px; font-size: 13px; letter-spacing: 2px;
      animation: toast-in 250ms ease-out, toast-out 400ms 2.6s forwards;
    }
    .toast.bad { border-left-color: #dc2626; }
    .toast.warn { border-left-color: #ca8a04; }
    @keyframes toast-in  { from { transform: translateX(20px); opacity: 0; } }
    @keyframes toast-out { to   { transform: translateX(20px); opacity: 0; } }
  </style>
</head>
<body>
{{errorBanner}}
<div id="stage"></div>
<script>
{{gameJs}}

// ─── Runtime glue (the LeanJs code exposes pure functions; this
// thin layer wires DOM events + render loop). All mutable state
// lives in `state`; we re-render on every transition. ───────────
const stage = document.getElementById('stage');
const lsKey = 'chuhan-save-v2';          // autosave (every action)
const lsCheckpointKey = 'chuhan-checkpoint';  // ↩ checkpoint
function slotKey(n) { return 'chuhan-slot-' + n; }

function loadFrom(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); }
  catch (_) { return null; }
}
function saveTo(key, state) {
  try { localStorage.setItem(key, JSON.stringify(state)); } catch (_) {}
}
function loadSave() { return loadFrom(lsKey); }
function persist(state) { saveTo(lsKey, state); }

// Checkpoint heuristic: snapshot just before a mini-game OR when a
// new scene starts (chapter boundaries). The phase/sceneId pair acts
// as the "interesting moment" marker.
let lastCheckpointKey = '';
function maybeCheckpoint(state) {
  // Take a checkpoint when entering minigame or after a scene change.
  const key = state.phase + ':' + state.sceneId;
  if (state.phase === 'minigame' && lastCheckpointKey !== 'mini:' + key) {
    lastCheckpointKey = 'mini:' + key;
    // Save the state BEFORE the mini-game began (mini.kind unset).
    // Approximation: save current state minus the mini sub-state.
    const before = {...state, mini: state.mini && state.mini.kind ? {...state.mini, kind: ''} : state.mini};
    saveTo(lsCheckpointKey, before);
  }
}

// ─── Audio runtime: two cross-fading <audio> elements with idempotent
// play(id). Files: /assets/bgm_${id}.ogg. Empty id ('') = stop. ──
window.chuhanAudio = (function () {
  const tracks = ['title','village','court','camp','battle','journey','grief','ending'];
  // Probe asset existence once so we don't spam 404s when running
  // before BGM has been generated.
  const have = {};
  tracks.forEach((id) => {
    fetch('/assets/bgm_' + id + '.ogg', {method: 'HEAD'})
      .then((r) => { have[id] = r.ok; })
      .catch(() => { have[id] = false; });
  });

  const els = [new Audio(), new Audio()];
  els.forEach((a) => { a.loop = true; a.volume = 0; a.preload = 'auto'; });
  let active = -1;
  let currentId = '';
  let muted = localStorage.getItem('chuhan-muted') === '1';
  const target = 0.45;

  function fade(el, to, ms) {
    const from = el.volume;
    const t0 = performance.now();
    function step(t) {
      const k = Math.min(1, (t - t0) / ms);
      el.volume = from + (to - from) * k;
      if (k < 1) requestAnimationFrame(step);
      else if (to === 0) { try { el.pause(); } catch (_) {} }
    }
    requestAnimationFrame(step);
  }

  function play(id) {
    if (id === currentId) return;
    currentId = id;
    // Fade out the previous track.
    if (active >= 0) fade(els[active], 0, 800);
    if (!id) { active = -1; return; }
    if (have[id] === false) return; // asset missing — silent
    const next = 1 - (active < 0 ? 1 : active);
    const el = els[next];
    el.src = '/assets/bgm_' + id + '.ogg';
    el.currentTime = 0;
    el.volume = 0;
    const tryPlay = el.play();
    if (tryPlay && tryPlay.catch) tryPlay.catch(() => {/* autoplay blocked — first click unlocks */});
    fade(el, muted ? 0 : target, 800);
    active = next;
  }

  function sfx(id) {
    if (muted) return;
    const a = new Audio('/assets/sfx_' + id + '.ogg');
    a.volume = 0.7;
    a.play().catch(() => {});
  }

  function toggleMute() {
    muted = !muted;
    localStorage.setItem('chuhan-muted', muted ? '1' : '0');
    if (active >= 0) fade(els[active], muted ? 0 : target, 200);
  }

  // First user gesture unlocks autoplay — retry current id if it didn't start.
  function unlock() {
    if (active >= 0 && els[active].paused && currentId) {
      els[active].play().catch(() => {});
    }
    document.removeEventListener('click', unlock);
    document.removeEventListener('keydown', unlock);
  }
  document.addEventListener('click', unlock);
  document.addEventListener('keydown', unlock);

  return { play, sfx, toggleMute, muted: () => muted };
})();

let state = loadSave() || initState;

// ─── Test mode: ?scene=xxx (&char=xxx) jumps directly. ────────────
(function applyUrlOverride() {
  const params = new URLSearchParams(window.location.search);
  const scene = params.get('scene');
  if (!scene) return;
  // Infer character from scene-id prefix when not given.
  let char = params.get('char') || '';
  if (!char) {
    if (scene.startsWith('liubang_'))    char = 'liubang';
    else if (scene.startsWith('xiangyu_')) char = 'xiangyu';
    else if (scene.startsWith('hanxin_'))  char = 'hanxin';
    else if (scene.startsWith('zhangliang_')) char = 'zhangliang';
    else if (scene.startsWith('xiaohe_'))  char = 'xiaohe';
    else if (scene.startsWith('fanzeng_')) char = 'fanzeng';
  }
  state = update({tag: 'jumpToScene', char: char, sceneId: scene}, state);
})();

function render() {
  stage.innerHTML = view(state);
  // The save menu is now rendered directly by LeanJs renderHud;
  // clicks fire via the existing data-msg delegation. We still
  // checkpoint here on transition.
  maybeCheckpoint(state);
  maybeStartRingLoop();
  wireChatHandlers();
  wireResolveHandlers();
  wireGmHandlers();
  wireSandboxSim();
}

// ─── Sandbox "わさわさ" agent sim (Canvas 2D). Little figures mill
// about the camp; the crowd's faction colours track the world's
// territory (flip a region and the mix visibly shifts). Purely
// ephemeral animation state — never touches the pure `state`. ───────
let sbSim = { agents: [], raf: null, w: 520, h: 150 };
const SB_FCOL = { han: '#3b82f6', chu: '#ef4444', qin: '#9ca3af', lords: '#22c55e' };
const SB_NOTABLE = { han: '韓信', chu: '項羽', qin: '子嬰', lords: '諸侯' };

function sbTargetCounts() {
  const w = state.world; const c = { han:0, chu:0, qin:0, lords:0 };
  if (!w) return c;
  for (const r of w.regions) c[r.owner] = (c[r.owner]||0) + 3;  // ~3 figures / region
  return c;
}
function sbSpawn(faction) {
  return {
    x: Math.random() * sbSim.w,
    y: 70 + Math.random() * 60,           // ground band (with depth)
    dir: Math.random() < 0.5 ? -1 : 1,
    sp: 0.2 + Math.random() * 0.5,
    ph: Math.random() * 6.28,
    faction: faction,
    notable: false
  };
}
function sbRebalance() {
  const target = sbTargetCounts();
  const have = { han:0, chu:0, qin:0, lords:0 };
  for (const a of sbSim.agents) if (!a.notable) have[a.faction]++;
  for (const f of ['han','chu','qin','lords']) {
    while (have[f] < (target[f]||0)) { sbSim.agents.push(sbSpawn(f)); have[f]++; }
    // trim excess of this faction
    if (have[f] > (target[f]||0)) {
      let over = have[f] - target[f];
      sbSim.agents = sbSim.agents.filter(a => {
        if (over > 0 && !a.notable && a.faction === f) { over--; return false; }
        return true;
      });
    }
  }
}
function sbSeed() {
  sbSim.agents = [];
  sbRebalance();
  // A named notable per faction that actually holds ground.
  const t = sbTargetCounts();
  for (const f of ['han','chu','qin','lords']) {
    if ((t[f]||0) > 0) {
      const a = sbSpawn(f); a.notable = true; a.label = SB_NOTABLE[f]; a.sp *= 0.6;
      sbSim.agents.push(a);
    }
  }
}
function sbDrawFigure(ctx, a) {
  const bob = Math.sin(a.ph) * 1.5;
  const scale = 0.6 + (a.y - 70) / 80 * 0.7;   // nearer (lower) = bigger
  const x = a.x, y = a.y + bob;
  ctx.strokeStyle = SB_FCOL[a.faction] || '#aaa';
  ctx.fillStyle = SB_FCOL[a.faction] || '#aaa';
  ctx.lineWidth = 1.4 * scale;
  const h = 9 * scale;
  // legs (walk cycle)
  const stride = Math.sin(a.ph * 2) * 2 * scale;
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x - stride, y + h * 0.5);
  ctx.moveTo(x, y); ctx.lineTo(x + stride, y + h * 0.5);
  // body
  ctx.moveTo(x, y); ctx.lineTo(x, y - h);
  ctx.stroke();
  // head
  ctx.beginPath();
  ctx.arc(x, y - h - 1.6 * scale, 1.8 * scale, 0, 6.29);
  ctx.fill();
  if (a.notable && a.label) {
    ctx.fillStyle = '#f0e6d2';
    ctx.font = (6 * scale + 3) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(a.label, x, y - h - 6 * scale);
  }
}
function wireSandboxSim() {
  if (state.phase !== 'sandbox') {
    if (sbSim.raf !== null) { cancelAnimationFrame(sbSim.raf); sbSim.raf = null; }
    sbSim.agents = [];
    return;
  }
  const c = document.getElementById('sbStage');
  if (!c) return;
  if (sbSim.agents.length === 0) sbSeed();
  if (sbSim.raf !== null) return;   // loop already running
  const ctx = c.getContext('2d');
  let frames = 0;
  function frame() {
    if (state.phase !== 'sandbox' || !document.getElementById('sbStage')) {
      sbSim.raf = null; return;
    }
    frames++;
    if (frames % 90 === 0) sbRebalance();   // track territory ~1.5s
    ctx.clearRect(0, 0, c.width, c.height);
    // ground line
    ctx.strokeStyle = '#2a2318'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, 68); ctx.lineTo(c.width, 68); ctx.stroke();
    // sort by y so nearer figures draw on top
    const drawn = sbSim.agents.slice().sort((p, q) => p.y - q.y);
    for (const a of sbSim.agents) {
      a.ph += 0.12;
      a.x += a.dir * a.sp;
      if (a.x < 6) { a.x = 6; a.dir = 1; }
      if (a.x > c.width - 6) { a.x = c.width - 6; a.dir = -1; }
      if (Math.random() < 0.006) a.dir *= -1;      // random turn
    }
    for (const a of drawn) sbDrawFigure(ctx, a);
    sbSim.raf = requestAnimationFrame(frame);
  }
  sbSim.raf = requestAnimationFrame(frame);
}

// ─── Sandbox game master: free-text action → /api/gm → world deltas.
// Falls back to the local event table (via 'gmError') when the LLM is
// unreachable, so the sandbox stays playable fully offline. ─────────
function wireGmHandlers() {
  const send = document.getElementById('gmSend');
  const input = document.getElementById('gmInput');
  if (!send || !input) return;
  if (send.dataset.wired) return;
  send.dataset.wired = '1';
  const snapshot = () => {
    const w = state.world;
    if (!w) return '';
    return w.regions.map(r => r.id + '(' + r.ja + '):' + r.owner + ' ' + r.ctrl + '%').join(', ')
      + ' / BCE ' + w.year + ' ' + '春夏秋冬'[w.season];
  };
  const doSend = async () => {
    const text = input.value.trim();
    if (!text || (state.world && state.world.pending === 1)) return;
    input.value = '';
    state = update({tag: 'gmSubmit', text: text}, state);
    persist(state); render();
    try {
      const res = await fetch('/api/gm', {
        method: 'POST',
        headers: {'content-type': 'application/json'},
        body: JSON.stringify({action: text, world: snapshot()})
      });
      const j = await res.json();
      if (j.error) {
        state = update({tag: 'gmError', text: ''}, state);
      } else {
        state = update({tag: 'gmResult',
                        narration: j.narration || '（天は沈黙している）',
                        deltas: j.deltas || []}, state);
      }
    } catch (e) {
      state = update({tag: 'gmError', text: ''}, state);
    }
    persist(state); render();
  };
  send.addEventListener('click', doSend);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
  });
}

// ─── LLM chat wiring: send button + Enter, scroll, focus ──────────
function wireChatHandlers() {
  const send = document.getElementById('chatSend');
  const input = document.getElementById('chatInput');
  const history = document.getElementById('chatHistory');
  if (history) history.scrollTop = history.scrollHeight;
  if (!send || !input) return;
  if (send.dataset.wired) return;
  send.dataset.wired = '1';
  const doSend = async () => {
    const text = input.value.trim();
    if (!text || state.llm.pending) return;
    input.value = '';
    state = update({tag: 'llmSendUser', text: text}, state);
    persist(state);
    render();
    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: {'content-type': 'application/json'},
        body: JSON.stringify({
          npcId: state.llm.npcId,
          sceneId: state.sceneId,
          history: state.llm.history.slice(0, -1),  // exclude the just-pushed user msg
          message: text
        })
      });
      const j = await res.json();
      if (j.error) {
        state = update({tag: 'llmError', text: j.error}, state);
      } else {
        state = update({tag: 'llmReply', text: j.reply || '(空の応答)'}, state);
      }
    } catch (e) {
      state = update({tag: 'llmError', text: 'network: ' + e.message}, state);
    }
    persist(state);
    render();
  };
  send.addEventListener('click', doSend);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doSend();
    }
  });
  input.focus();
}

// ─── TRPG aiResolve wiring — same shape as chat: send button + Enter,
// fetch /api/resolve, dispatch resolveResult or resolveError. The
// outcome label + LLM reasoning then drives the branch when the player
// clicks the rendered 次へ button (handled by the regular click
// delegation since it's a `btn-primary` with data-msg).
function wireResolveHandlers() {
  const send = document.getElementById('resolveSend');
  const input = document.getElementById('resolveInput');
  if (!send || !input) return;
  if (send.dataset.wired) return;
  send.dataset.wired = '1';
  const doSend = async () => {
    const text = input.value.trim();
    if (!text || state.resolve.pending) return;
    input.value = '';
    state = update({tag: 'resolveSubmit', text: text}, state);
    persist(state);
    render();
    try {
      const res = await fetch('/api/resolve', {
        method: 'POST',
        headers: {'content-type': 'application/json'},
        body: JSON.stringify({
          kind: state.resolve.kind,
          sceneId: state.sceneId,
          char: state.char,
          action: text
        })
      });
      const j = await res.json();
      if (j.error) {
        state = update({tag: 'resolveError', text: j.error}, state);
      } else {
        state = update({tag: 'resolveResult',
                        outcome: j.outcome || 'ok',
                        reasoning: j.reasoning || '(no reasoning)'},
                       state);
      }
    } catch (e) {
      state = update({tag: 'resolveError', text: 'network: ' + e.message}, state);
    }
    persist(state);
    render();
  };
  send.addEventListener('click', doSend);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      doSend();
    }
  });
  input.focus();
}

// Pick an SFX from a button's .btn-KIND class. One table, one place to
// edit; adding a new button kind in Game.leanjs only needs an entry
// here (and a CSS variant) — no per-msg.tag plumbing.
const SFX_BY_KIND = {
  primary: 'chime',
  icon:    'page',
  menu:    'page',
  choice:  'page',
  face:    'coin',
  jade:    'drum',
  card:    'coin',
  char:    'chime',
};
function sfxForButton(btn) {
  if (!btn || !window.chuhanAudio) return;
  for (const cls of btn.classList) {
    if (cls.startsWith('btn-')) {
      const id = SFX_BY_KIND[cls.slice(4)];
      if (id) { window.chuhanAudio.sfx(id); return; }
    }
  }
}

// Image 404 → loud .missing-asset placeholder so the gap is impossible
// to miss in-game. The server-side asset audit (Serve.lean) also lists
// these to MISSING_ASSETS.txt at boot.
stage.addEventListener('error', (e) => {
  const t = e.target;
  if (t && t.tagName === 'IMG') {
    const name = t.getAttribute('alt') || t.getAttribute('src') || 'asset';
    const div = document.createElement('div');
    div.className = 'missing-asset';
    div.dataset.name = name;
    div.title = 'MISSING_ASSET: ' + name;
    div.textContent = '? ' + name;
    t.replaceWith(div);
  }
}, true);

// Event delegation — every interactive element has a data-msg attr
// whose value is a JSON-encoded message we pass to update().
stage.addEventListener('click', (e) => {
  let t = e.target;
  while (t && t !== stage) {
    if (t.dataset && t.dataset.msg) {
      const msg = JSON.parse(t.dataset.msg);
      const prevPhase = state.phase;
      sfxForButton(t);
      state = update(msg, state);
      // Chime once when a fresh ending unlocks.
      if (state.phase === 'ending' && prevPhase !== 'ending') {
        window.chuhanAudio && window.chuhanAudio.sfx('chime');
      }
      persist(state);
      render();
      return;
    }
    t = t.parentNode;
  }
});

// Keyboard: space/enter advances dialogue; arrow keys in battle.
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    const prevPhase = state.phase;
    window.chuhanAudio && window.chuhanAudio.sfx('page');
    state = update({tag: 'advance'}, state);
    if (state.phase === 'ending' && prevPhase !== 'ending') {
      window.chuhanAudio && window.chuhanAudio.sfx('chime');
    }
    persist(state);
    render();
  } else if (state.phase === 'battle') {
    if (e.key === 'ArrowUp' || e.key === 'w')    state = update({tag: 'move', dx: 0,  dy: -1}, state);
    if (e.key === 'ArrowDown' || e.key === 's')  state = update({tag: 'move', dx: 0,  dy: 1}, state);
    if (e.key === 'ArrowLeft' || e.key === 'a')  state = update({tag: 'move', dx: -1, dy: 0}, state);
    if (e.key === 'ArrowRight' || e.key === 'd') state = update({tag: 'move', dx: 1,  dy: 0}, state);
    if (e.key === 'z' || e.key === 'j') {
      window.chuhanAudio && window.chuhanAudio.sfx('clash');
      state = update({tag: 'attack'}, state);
    }
    persist(state);
    if (state.phase === 'battle') {
      renderBattle();
    } else {
      render();
    }
  }
});

// ─── Mini-game: jade_ring real-time tick loop ─────────────────────
let ringRafHandle = null;
let ringStartWallMs = 0;
function maybeStartRingLoop() {
  if (state.phase === 'minigame' && state.mini && state.mini.kind === 'jade_ring') {
    if (ringRafHandle !== null) return;
    ringStartWallMs = performance.now();
    function frame() {
      if (state.phase !== 'minigame' || !state.mini || state.mini.kind !== 'jade_ring' || state.mini.ringFinished) {
        ringRafHandle = null;
        // re-render once finished to show the result
        if (state.phase === 'minigame') render();
        return;
      }
      const now = performance.now() - ringStartWallMs;
      state = update({tag: 'miniRingTick', now: now}, state);
      // Re-render the jade-ring view inline (cheap — small DOM).
      // NB: the panel class is `.panel-mini` now, not the historical
      // `.mini-card`. Keep these two in sync with the panel helper.
      const card = stage.querySelector('.panel-mini');
      if (card) card.outerHTML = (function() {
        const fragHtml = view(state);
        const tmp = document.createElement('div');
        tmp.innerHTML = fragHtml;
        const c = tmp.querySelector('.panel-mini');
        return c ? c.outerHTML : fragHtml;
      })();
      ringRafHandle = requestAnimationFrame(frame);
    }
    ringRafHandle = requestAnimationFrame(frame);
  } else if (ringRafHandle !== null && (!state.mini || state.mini.kind !== 'jade_ring')) {
    cancelAnimationFrame(ringRafHandle);
    ringRafHandle = null;
  }
}

// ─── Battle render — separate from main DOM render so we can use
// requestAnimationFrame for smooth motion + tick the AI. ────────
let battleRafHandle = null;
function renderBattle() {
  render();  // emit canvas element via view()
  const c = document.getElementById('battleCanvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  function frame() {
    if (state.phase !== 'battle') { battleRafHandle = null; return; }
    state = update({tag: 'tick', ms: 16}, state);
    drawBattle(ctx, c.width, c.height, state.battle);
    battleRafHandle = requestAnimationFrame(frame);
  }
  if (battleRafHandle === null) battleRafHandle = requestAnimationFrame(frame);
}

// Plain JS draw routine — sprites and HP bars. The LeanJs side
// owns the game state; this is pure rendering.
function drawBattle(ctx, W, H, b) {
  ctx.fillStyle = '#2a2418'; ctx.fillRect(0, 0, W, H);
  // floor grid
  ctx.strokeStyle = '#3a3018'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 32) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 32) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // entities
  for (const e of b.entities) {
    if (e.hp <= 0) continue;
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x - 12, e.y - 12, 24, 24);
    // facing arrow
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x + e.facing.dx * 14 - 2, e.y + e.facing.dy * 14 - 2, 4, 4);
    // hp bar
    const hpW = 24, hpFrac = Math.max(0, e.hp / e.maxHp);
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(e.x - hpW/2, e.y - 22, hpW, 3);
    ctx.fillStyle = hpFrac > 0.5 ? '#16a34a' : hpFrac > 0.25 ? '#ca8a04' : '#dc2626';
    ctx.fillRect(e.x - hpW/2, e.y - 22, hpW * hpFrac, 3);
  }
  // attack swings
  for (const fx of b.fx) {
    ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(fx.x, fx.y, fx.r, 0, Math.PI * 2); ctx.stroke();
  }
}

// Subscribe to phase changes so the battle loop kicks in once we
// enter `phase === 'battle'` from a dialogue choice.
function maybeStartBattle() {
  if (state.phase === 'battle' && battleRafHandle === null) {
    requestAnimationFrame(() => renderBattle());
  }
}

// Wrap render so phase transitions to battle bootstrap the loop.
const origRender = render;
window.render = function() {
  origRender();
  maybeStartBattle();
};

render();
</script>
</body>
</html>
